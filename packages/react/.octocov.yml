repository: konojunya/vimee/packages/react
coverage:
  paths:
    - coverage/lcov.info
  acceptable:
    current: ">= 80%"
    diff: ">= -5.0%"
codeToTestRatio:
  code:
    - "src/**/*.ts"
    - "src/**/*.tsx"
    - "!src/**/*.test.ts"
    - "!src/**/*.test.tsx"
    - "!src/index.ts"
  test:
    - "src/**/*.test.ts"
    - "src/**/*.test.tsx"
testExecutionTime:
  acceptable:
    current: "< 1min"
    diff: "< 30sec"
comment:
  enable: true
summary:
  enable: true
report:
  datastores:
    - artifact://default
