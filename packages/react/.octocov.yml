repository: konojunya/vimee/packages/react
coverage:
  paths:
    - coverage/lcov.info
  acceptable: current >= 80%
codeToTestRatio:
  code:
    - "src/**/*.ts"
    - "src/**/*.tsx"
    - "!src/**/*.test.ts"
    - "!src/**/*.test.tsx"
    - "!src/index.ts"
  test:
    - "src/**/*.test.ts"
    - "src/**/*.test.tsx"
testExecutionTime:
  acceptable: current < 1min
comment:
  enable: true
summary:
  enable: true
report:
  datastores:
    - artifact://default
