name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  deps:
    runs-on: ubuntu-latest
    steps:
      - &checkout
        uses: actions/checkout@v6

      - &setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17

      - &cache
        name: cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bun
          key: bun-${{ runner.os }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

  lint:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *setup-bun
      - *cache

      - name: Lint
        run: bun run lint

  build:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *setup-bun
      - *cache

      - name: Build
        run: bun run build

  typecheck:
    needs: deps
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *setup-bun
      - *cache

      - name: Type check
        run: bun run typecheck

  test-coverage:
    name: test-coverage (${{ matrix.package }})
    needs:
      - deps
      - build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: '@vimee/core'
            octocov: packages/core/.octocov.yml
          - package: '@vimee/react'
            octocov: packages/react/.octocov.yml
          - package: '@vimee/plugin-textarea'
            octocov: packages/plugin-textarea/.octocov.yml
          - package: '@vimee/shiki-editor'
            octocov: packages/shiki-editor/.octocov.yml
    steps:
      - *checkout
      - *setup-bun
      - *cache

      - name: Test with coverage
        run: bun run --filter ${{ matrix.package }} test:coverage
        working-directory: .

      - uses: k1LoW/octocov-action@v1
        with:
          config: ${{ matrix.octocov }}
