name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17

      - name: cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Type check
        run: bun run typecheck

      - name: Test with coverage (@vimee/core)
        run: bun run --filter @vimee/core test:coverage

      - uses: k1LoW/octocov-action@v1
        with:
          config: packages/core/.octocov.yml

      - name: Test with coverage (@vimee/react)
        run: bun run --filter @vimee/react test:coverage

      - uses: k1LoW/octocov-action@v1
        with:
          config: packages/react/.octocov.yml

      - name: Test with coverage (@vimee/plugin-textarea)
        run: bun run --filter @vimee/plugin-textarea test:coverage

      - uses: k1LoW/octocov-action@v1
        with:
          config: packages/plugin-textarea/.octocov.yml

      - name: Test with coverage (@vimee/shiki-editor)
        run: bun run --filter @vimee/shiki-editor test:coverage

      - uses: k1LoW/octocov-action@v1
        with:
          config: packages/shiki-editor/.octocov.yml

      - name: Test with coverage (@vimee/testkit)
        run: bun run --filter @vimee/testkit test:coverage

      - uses: k1LoW/octocov-action@v1
        with:
          config: packages/testkit/.octocov.yml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: packages/core/coverage/lcov.info,packages/react/coverage/lcov.info,packages/plugin-textarea/coverage/lcov.info,packages/shiki-editor/coverage/lcov.info,packages/testkit/coverage/lcov.info
          flags: core,react,plugin-textarea,shiki-editor,testkit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
