name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Type check
        run: bun run typecheck

  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test with coverage
        run: bun run --filter @vimee/core test:coverage
        working-directory: .

      - uses: k1LoW/octocov-action@v1
        with:
          config: packages/core/.octocov.yml

  test-react:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build dependencies
        run: bun run --filter @vimee/core build

      - name: Test with coverage
        run: bun run --filter @vimee/react test:coverage
        working-directory: .

      - uses: k1LoW/octocov-action@v1
        with:
          config: packages/react/.octocov.yml

  test-plugin-textarea:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build dependencies
        run: bun run --filter @vimee/core build

      - name: Test with coverage
        run: bun run --filter @vimee/plugin-textarea test:coverage
        working-directory: .

      - uses: k1LoW/octocov-action@v1
        with:
          config: packages/plugin-textarea/.octocov.yml

  test-shiki-editor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build dependencies
        run: bun run --filter @vimee/core build && bun run --filter @vimee/react build

      - name: Test with coverage
        run: bun run --filter @vimee/shiki-editor test:coverage
        working-directory: .

      - uses: k1LoW/octocov-action@v1
        with:
          config: packages/shiki-editor/.octocov.yml
